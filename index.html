<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOCES_관리자 일정관리표</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f4f8;color:#1a202c;font-size:14px;min-height:100vh;transition:background .3s,color .3s}
body.dark{background:#0f172a;color:#f1f5f9}
body.dark .panel{background:#1e293b;border-color:#334155}
body.dark .btn{background:#1e293b;border-color:#334155;color:#f1f5f9}
body.dark .btn:hover{background:#273549}
body.dark .btn.prim{background:#3b82f6;color:#fff;border-color:#3b82f6}
body.dark .btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
body.dark .month-wrap{background:#1e293b;border-color:#334155}
body.dark .dow-row{background:#162032;border-color:#334155}
body.dark .dow{color:#64748b}
body.dark .dc{border-color:#1e293b}
body.dark .dc:hover{background:#273549}
body.dark .dc.om{background:#131f30}
body.dark .dc.om .dnum{color:#334155}
body.dark .dc.today{background:#1e3a5f}
body.dark .dnum{color:#cbd5e1}
body.dark .add-row input{background:#1e293b;border-color:#334155;color:#f1f5f9}
body.dark .modal{background:#1e293b;border-color:#334155}
body.dark .modal h3{color:#f1f5f9}
body.dark .fg input,body.dark .fg textarea,body.dark .fg select{background:#0f172a;border-color:#334155;color:#f1f5f9}
body.dark .mact{border-color:#334155}
body.dark .week-wrap{background:#1e293b;border-color:#334155}
body.dark .wk-hdr{background:#162032;border-color:#334155}
body.dark .wdhdr{border-color:#1e293b}
body.dark .wdhdr .dnum2{color:#cbd5e1}
body.dark .wdc{border-color:#1e293b}
body.dark .whs{border-color:#162032}
body.dark .whs:hover{background:#273549}
body.dark .tlbl{color:#334155;border-color:#1e293b}
body.dark .cal-title{color:#f1f5f9}
.dark-toggle{background:none;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:18px;padding:2px 8px;line-height:1.4}
body.dark .dark-toggle{border-color:#334155}
.btn{padding:6px 14px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#374151;transition:all .15s;font-family:inherit;font-weight:500}
.btn:hover{background:#f8fafc;border-color:#cbd5e1}
.btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.btn.prim{background:#3b82f6;color:#fff;border-color:#3b82f6;box-shadow:0 1px 4px rgba(59,130,246,.3)}
.btn.prim:hover{background:#2563eb}
.btn.danger{background:#fff;color:#ef4444;border-color:#fca5a5}
.btn.danger:hover{background:#fff5f5}
.btn:disabled{opacity:.4;cursor:not-allowed}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.main{padding:14px 18px;max-width:1100px;margin:0 auto}
.panel{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.user-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:28px}
.utag{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 8px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.utag .x{background:rgba(255,255,255,.3);border:none;color:#fff;width:16px;height:16px;border-radius:50%;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0}
.utag .x:hover{background:rgba(255,255,255,.55)}
.add-row{display:flex;gap:8px}
.add-row input{flex:1;padding:7px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#f8fafc;color:#1a202c;font-family:inherit}
.add-row input:focus{outline:none;border-color:#3b82f6;background:#fff}
.ftag{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:2px solid transparent;font-weight:600;color:#fff;opacity:.5;transition:all .15s}
.ftag.on{opacity:1;border-color:rgba(0,0,0,.15)}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.cal-title{font-size:18px;font-weight:700;color:#1a202c;letter-spacing:-.3px}
.bgroup{display:flex;gap:6px;align-items:center}
.month-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-bottom:1px solid #e2e8f0}
.dow{text-align:center;padding:10px 4px;font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.5px}
.days-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.dc{height:96px;overflow:hidden;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;padding:6px 5px;cursor:pointer;transition:background .12s}
.dc:nth-child(7n){border-right:none}
.dc:hover{background:#f8fafc}
.dc.om{background:#fafafa}
.dc.om .dnum{color:#cbd5e1}
.dnum{font-size:12px;font-weight:700;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;border-radius:50%;color:#374151}
.dc.today{background:#eff6ff}
.dc.today .dnum{background:#3b82f6;color:#fff}
.dc.today:hover{background:#dbeafe}
.chip{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;color:#fff;font-weight:600;line-height:1.5}
.more{font-size:11px;color:#3b82f6;padding:1px 4px;font-weight:600;cursor:pointer}
.more:hover{text-decoration:underline}
.week-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:auto;max-height:65vh}
.wk-hdr{display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:1px solid #e2e8f0;position:sticky;top:0;background:#f8fafc;z-index:10}
.wdhdr{padding:10px 4px;text-align:center;font-size:11px;border-left:1px solid #f1f5f9}
.wdhdr .dow2{font-weight:700;color:#94a3b8;font-size:10px;letter-spacing:.5px}
.wdhdr .dnum2{font-size:20px;font-weight:700;margin-top:2px;color:#374151}
.wdhdr.tod .dnum2{color:#3b82f6}
.wk-body{display:grid;grid-template-columns:52px repeat(7,1fr)}
.tcol{display:flex;flex-direction:column}
.tlbl{height:44px;display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 8px 0 0;font-size:10px;color:#cbd5e1;border-right:1px solid #f1f5f9;font-weight:600}
.wdc{border-left:1px solid #f1f5f9;position:relative}
.whs{height:44px;border-bottom:1px solid #f8fafc;cursor:pointer}
.whs:hover{background:#f8fafc}
.wev{position:absolute;left:2px;right:2px;border-radius:5px;padding:3px 5px;font-size:10px;color:#fff;overflow:hidden;cursor:pointer;z-index:5;min-height:20px;line-height:1.4}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.5);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:26px;width:460px;max-width:94vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:20px;color:#1a202c}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#f8fafc;color:#1a202c;font-family:inherit;line-height:1.5}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:#3b82f6;background:#fff}
.fg textarea{resize:vertical;min-height:80px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tsel{flex:1;padding:9px 6px !important;width:auto !important}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #f1f5f9}
@media(max-width:600px){
  .main{padding:8px 10px}
  .panel{padding:12px;border-radius:10px}
  .cal-hdr{gap:6px}
  .cal-title{font-size:15px}
  .btn{padding:5px 10px;font-size:12px}
  .bgroup{gap:4px}
  .dow{padding:8px 2px;font-size:11px}
  .dc{height:calc((100vh - 260px) / 6);min-height:70px;padding:4px 3px}
  .dnum{font-size:12px;width:22px;height:22px;margin-bottom:3px}
  .chip{font-size:10px;padding:2px 4px}
  .more{font-size:10px}
  .wdhdr .dnum2{font-size:16px}
  .wdhdr{padding:8px 2px}
  .tlbl{font-size:9px;padding:2px 4px 0 0}
  .modal{padding:18px;width:100%;border-radius:12px}
  .frow{grid-template-columns:1fr}
  .ftag{font-size:12px;padding:4px 10px}
  .utag{font-size:12px}
  .month-wrap{border-radius:10px}
}
</style>
</head>
<body>

<div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:22px 0 2px">
  <div style="font-size:20px;font-weight:700;letter-spacing:-.3px">KOCES_관리자 일정관리표</div>
  <button class="dark-toggle" onclick="toggleDark()" id="dark-btn">🌙</button>
</div>
<div style="text-align:center;font-size:12px;color:#94a3b8;margin-bottom:2px" id="today-label"></div>
<div style="text-align:center;font-size:12px;margin-bottom:6px" id="conn-badge"></div>

<div class="main">
  <div class="panel">
    <div onclick="togglePanel()" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px">
      <span>팀원 관리</span>
      <span id="panel-arrow">▼</span>
    </div>
    <div id="panel-body" style="margin-top:12px;display:none">
      <div class="user-list" id="user-list"></div>
      <div class="add-row">
        <input type="text" id="new-name" placeholder="팀원 이름을 입력하세요" maxlength="20">
        <button class="btn prim" onclick="addUser()">+ 추가</button>
      </div>
    </div>
  </div>

  <div style="margin-bottom:12px">
    <div onclick="toggleFilter2()" style="cursor:pointer;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">
      <span>필터</span>
      <span id="filter-arrow">▼</span>
    </div>
    <div id="filter-bar" style="display:none;flex-wrap:wrap;gap:6px"></div>
  </div>

  <div class="cal-hdr">
    <div class="bgroup">
      <button class="btn" onclick="prev()" style="font-size:15px;padding:5px 14px">&#8249; 이전</button>
      <button class="btn" onclick="goToday()">오늘</button>
      <button class="btn" onclick="next()" style="font-size:15px;padding:5px 14px">다음 &#8250;</button>
    </div>
    <div class="cal-title" id="cal-title"></div>
    <div class="bgroup">
      <button class="btn" id="btn-month" onclick="setView('month')">월별</button>
      <button class="btn" id="btn-week" onclick="setView('week')">주별</button>
      <button class="btn prim" id="btn-add" onclick="openNew()" disabled>+ 일정 추가</button>
    </div>
  </div>
  <div id="cal-body"></div>
</div>
<div id="modal-root"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAlY-_cjSKXPypp8PEa6h-3OnV5-QyqFKY",
  authDomain: "koces-edaa4.firebaseapp.com",
  databaseURL: "https://koces-edaa4-default-rtdb.firebaseio.com",
  projectId: "koces-edaa4",
  storageBucket: "koces-edaa4.firebasestorage.app",
  messagingSenderId: "655090030132",
  appId: "1:655090030132:web:eca03d39648fed35571c61"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const dataRef=db.ref('koces-cal');

const COLORS=['#4A90E2','#E74C3C','#2ECC71','#F39C12','#9B59B6','#1ABC9C','#E67E22','#34495E','#E91E63','#00BCD4'];
let S={users:[],events:[],curUser:null,view:'month',date:new Date(),filters:null,modal:null};
let _mdOnOverlay=false,_initialized=false;

dataRef.on('value',function(snapshot){
  const data=snapshot.val();
  if(data){S.users=data.users||[];S.events=data.events||[];if(!_initialized&&S.users.length){S.curUser=S.users[0].id;_initialized=true;}}
  render();
});

db.ref('.info/connected').on('value',function(snap){
  const el=document.getElementById('conn-badge');
  el.innerHTML=snap.val()?'<span style="color:#22c55e;font-weight:600">● 실시간 연결됨</span>':'<span style="color:#f87171;font-weight:600">● 연결 끊김</span>';
});

function save(){dataRef.set({users:S.users,events:S.events});}

function toggleDark(){
  document.body.classList.toggle('dark');
  document.getElementById('dark-btn').textContent=document.body.classList.contains('dark')?'☀️':'🌙';
}

function togglePanel(){
  const b=document.getElementById('panel-body'),a=document.getElementById('panel-arrow');
  const h=b.style.display==='none';b.style.display=h?'block':'none';a.textContent=h?'▲':'▼';
}

function toggleFilter2(){
  const b=document.getElementById('filter-bar'),a=document.getElementById('filter-arrow');
  const h=b.style.display==='none';b.style.display=h?'flex':'none';a.textContent=h?'▲':'▼';
}

function genId(){return Math.random().toString(36).slice(2,9)}
function fmt(d){return d.getFullYear()+'-'+n2(d.getMonth()+1)+'-'+n2(d.getDate())}
function n2(n){return String(n).padStart(2,'0')}
function getUser(id){return S.users.find(u=>u.id===id)}
function getColor(id){const u=getUser(id);return u?u.color:'#999'}
function getName(id){const u=getUser(id);return u?u.name:'?'}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function isVisible(uid){return!S.filters||S.filters.includes(uid)}
function dayEvts(d){const s=fmt(d);return S.events.filter(ev=>ev.date===s&&isVisible(ev.userId))}
function pTime(t){if(!t)return 0;const p=t.split(':');return parseInt(p[0])*60+parseInt(p[1])}

function buildHourOpts(sel){
  let h='<option value="">--</option>';
  for(let i=0;i<24;i++){const v=n2(i);h+='<option value="'+v+'"'+((sel||'').startsWith(v+':')?' selected':'')+'>'+v+'시</option>';}
  return h;
}
function buildMinOpts(sel){
  let h='<option value="">--</option>';
  ['00','10','20','30','40','50'].forEach(v=>{h+='<option value="'+v+'"'+((sel||'').endsWith(':'+v)?' selected':'')+'>'+v+'분</option>';});
  return h;
}

function render(){
  renderUserList();renderFilterBar();renderCalTitle();renderCal();renderModal();
  document.getElementById('btn-month').classList.toggle('active',S.view==='month');
  document.getElementById('btn-week').classList.toggle('active',S.view==='week');
  if(S.users.length&&!S.curUser)S.curUser=S.users[0].id;
  document.getElementById('btn-add').disabled=!S.users.length;
}

function renderUserList(){
  const el=document.getElementById('user-list');
  if(!S.users.length){el.innerHTML='<span style="font-size:12px;color:#cbd5e1">아직 팀원이 없습니다</span>';return;}
  let h='';S.users.forEach(u=>{h+='<div class="utag" style="background:'+u.color+'"><div class="avatar" style="width:18px;height:18px;background:rgba(255,255,255,.25);color:#fff;font-size:10px">'+u.name[0]+'</div>'+u.name+'<button class="x" onclick="delUser(\''+u.id+'\')">✕</button></div>';});
  el.innerHTML=h;
}

function renderFilterBar(){
  const el=document.getElementById('filter-bar');
  if(!S.users.length){el.innerHTML='';return;}
  const all=!S.filters;
  let h='<div class="ftag on" style="background:#64748b;border-color:'+(all?'rgba(0,0,0,.2)':'transparent')+';opacity:'+(all?1:.5)+'" onclick="S.filters=null;render()">전체</div>';
  S.users.forEach(u=>{const a=S.filters&&S.filters.includes(u.id);h+='<div class="ftag '+(a?'on':'')+'" style="background:'+u.color+'" onclick="toggleFilter(\''+u.id+'\')">'+u.name+'</div>';});
  el.innerHTML=h;
}

function renderCalTitle(){
  const d=S.date;let t='';
  if(S.view==='month'){t=d.getFullYear()+'년 '+(d.getMonth()+1)+'월';}
  else{const ws=weekStart(d),we=new Date(ws);we.setDate(we.getDate()+6);t=ws.getFullYear()+'년 '+(ws.getMonth()+1)+'월 '+ws.getDate()+'일 ~ '+(we.getMonth()+1)+'월 '+we.getDate()+'일';}
  document.getElementById('cal-title').textContent=t;
}

function renderCal(){document.getElementById('cal-body').innerHTML=S.view==='month'?buildMonth():buildWeek();}

function buildMonth(){
  const y=S.date.getFullYear(),mo=S.date.getMonth();
  const fd=new Date(y,mo,1),off=fd.getDay(),dim=new Date(y,mo+1,0).getDate();
  const today=new Date();const days=[];
  for(let i=0;i<off;i++)days.push({d:new Date(y,mo,-off+1+i),om:true});
  for(let i=1;i<=dim;i++)days.push({d:new Date(y,mo,i),om:false});
  while(days.length%7)days.push({d:new Date(y,mo+1,days.length-off-dim+1),om:true});
  const DNS=['일','월','화','수','목','금','토'];
  let h='<div class="month-wrap"><div class="dow-row">';
  DNS.forEach((n,i)=>{h+='<div class="dow" style="'+(i===0?'color:#f87171':i===6?'color:#60a5fa':'')+'">' +n+'</div>';});
  h+='</div><div class="days-grid">';
  days.forEach(function(item){
    const dt=item.d,om=item.om,isT=sameDay(dt,today),ds=fmt(dt),evts=dayEvts(dt);
    h+='<div class="dc'+(om?' om':'')+(isT?' today':'')+'" onclick="openNewDate(\''+ds+'\')">';
    h+='<div class="dnum" style="'+(dt.getDay()===0&&!isT?'color:#f87171':dt.getDay()===6&&!isT?'color:#60a5fa':'')+'">'+ dt.getDate()+'</div>';
    evts.slice(0,3).forEach(ev=>{h+='<div class="chip" style="background:'+getColor(ev.userId)+'" onclick="event.stopPropagation();openEdit(\''+ev.id+'\')" title="'+ev.title+'">'+(ev.startTime?ev.startTime+' ':'')+ev.title+'</div>';});
    if(evts.length>3)h+='<div class="more" onclick="event.stopPropagation();openDayAll(\''+ds+'\')">+'+(evts.length-3)+'개 더보기</div>';
    h+='</div>';
  });
  h+='</div></div>';return h;
}

function weekStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());return r;}

function buildWeek(){
  const ws=weekStart(S.date);
  const days=[];for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);days.push(d);}
  const today=new Date(),DNS=['일','월','화','수','목','금','토'];
  let h='<div class="week-wrap"><div class="wk-hdr"><div style="border-right:1px solid #f1f5f9"></div>';
  days.forEach((d,i)=>{h+='<div class="wdhdr'+(sameDay(d,today)?' tod':'')+'"><div class="dow2" style="'+(i===0?'color:#f87171':i===6?'color:#60a5fa':'')+'">'+DNS[i]+'</div><div class="dnum2">'+d.getDate()+'</div></div>';});
  h+='</div><div class="wk-body"><div class="tcol">';
  for(let i=0;i<24;i++)h+='<div class="tlbl">'+n2(i)+':00</div>';
  h+='</div>';
  days.forEach((d)=>{
    const ds=fmt(d),evts=dayEvts(d).filter(ev=>ev.startTime);
    h+='<div class="wdc">';
    for(let i=0;i<24;i++)h+='<div class="whs" onclick="openNewDT(\''+ds+'\',\''+n2(i)+':00\')"></div>';
    evts.forEach(ev=>{const sm=pTime(ev.startTime),em=ev.endTime?pTime(ev.endTime):sm+60,top=(sm/60)*44,ht=Math.max(20,((em-sm)/60)*44);h+='<div class="wev" style="background:'+getColor(ev.userId)+';top:'+top+'px;height:'+ht+'px" onclick="event.stopPropagation();openEdit(\''+ev.id+'\')"><strong>'+ev.startTime+'</strong> '+ev.title+'<div style="font-size:9px;opacity:.85">'+getName(ev.userId)+'</div></div>';});
    h+='</div>';
  });
  h+='</div></div>';return h;
}

function renderModal(){
  const el=document.getElementById('modal-root');
  if(!S.modal){el.innerHTML='';return;}
  const ev=S.modal,mode=ev._mode||'add';
  let body='';
  if(mode==='view'){
    const u=getUser(ev.userId);
    const dot='<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+(u?u.color:'#999')+';margin-right:6px"></span>';
    const timeStr=ev.startTime?(ev.startTime+(ev.endTime?' ~ '+ev.endTime:'')):'시간 없음';
    body='<div style="margin-bottom:20px">'+
      '<div style="font-size:20px;font-weight:700;color:#1a202c;margin-bottom:14px">'+ev.title+'</div>'+
      '<div style="display:flex;flex-direction:column;gap:10px;font-size:14px;color:#374151">'+
        '<div style="display:flex;align-items:center;gap:6px">'+dot+(u?u.name:'알 수 없음')+'</div>'+
        '<div style="display:flex;align-items:center;gap:8px"><span>📅</span>'+ev.date+'</div>'+
        '<div style="display:flex;align-items:center;gap:8px"><span>🕐</span>'+timeStr+'</div>'+
        (ev.memo?'<div style="padding:12px 14px;background:#f8fafc;border-radius:10px;color:#475569;line-height:1.7;font-size:13px">'+ev.memo+'</div>':'')+
      '</div></div>'+
      '<div class="mact"><button class="btn" onclick="closeModal()">닫기</button><button class="btn prim" onclick="switchToEdit()">✏️ 편집</button></div>';
  } else {
    const isEdit=mode==='edit';
    let uOpts='';S.users.forEach(u=>{uOpts+='<option value="'+u.id+'"'+(u.id===ev.userId?' selected':'')+'>'+u.name+'</option>';});
    const delBtn=isEdit?'<button class="btn danger" onclick="delEvent(\''+ev.id+'\')">🗑 삭제</button>':'';
    const saveId=isEdit?'\''+ev.id+'\'':'null';
    body='<h3>'+(isEdit?'✏️ 일정 수정':'📌 일정 추가')+'</h3>'+
      '<div class="fg"><label>담당자</label><select id="ev-u">'+uOpts+'</select></div>'+
      '<div class="fg"><label>제목</label><input type="text" id="ev-t" value="'+(ev.title||'')+'" placeholder="일정 제목을 입력하세요"></div>'+
      '<div class="fg"><label>날짜</label><input type="date" id="ev-d" value="'+(ev.date||'')+'"></div>'+
      '<div class="frow">'+
        '<div class="fg"><label>시작 시간</label><div style="display:flex;gap:6px">'+
          '<select id="ev-sh" class="tsel">'+buildHourOpts(ev.startTime)+'</select>'+
          '<select id="ev-sm" class="tsel" onchange="document.getElementById(\'ev-eh\').focus()">'+buildMinOpts(ev.startTime)+'</select>'+
        '</div></div>'+
        '<div class="fg"><label>종료 시간</label><div style="display:flex;gap:6px">'+
          '<select id="ev-eh" class="tsel">'+buildHourOpts(ev.endTime)+'</select>'+
          '<select id="ev-em" class="tsel" onchange="document.getElementById(\'ev-m\').focus()">'+buildMinOpts(ev.endTime)+'</select>'+
        '</div></div>'+
      '</div>'+
      '<div class="fg"><label>메모</label><textarea id="ev-m" placeholder="메모를 입력하세요">'+(ev.memo||'')+'</textarea></div>'+
      '<div class="mact">'+delBtn+'<button class="btn" onclick="'+(isEdit?'switchToView()':'closeModal()')+'">취소</button><button class="btn prim" onclick="doSave('+saveId+')">'+(isEdit?'저장':'추가')+'</button></div>';
    setTimeout(function(){const t=document.getElementById('ev-t');if(t)t.focus();},50);
  }
  el.innerHTML='<div class="overlay" onmousedown="overlayMD(event)" onmouseup="overlayMU(event)"><div class="modal" onclick="event.stopPropagation()">'+body+'</div></div>';
}

function overlayMD(ev){_mdOnOverlay=ev.target===ev.currentTarget;}
function overlayMU(ev){if(_mdOnOverlay&&ev.target===ev.currentTarget)closeModal();_mdOnOverlay=false;}
function switchToEdit(){S.modal._mode='edit';render();}
function switchToView(){S.modal._mode='view';render();}

function doSave(id){
  const uid2=document.getElementById('ev-u').value;
  const title=document.getElementById('ev-t').value.trim();
  const date=document.getElementById('ev-d').value;
  const sh=document.getElementById('ev-sh').value,sm=document.getElementById('ev-sm').value;
  const eh=document.getElementById('ev-eh').value,em=document.getElementById('ev-em').value;
  const memo=document.getElementById('ev-m').value.trim();
  const startTime=sh&&sm?sh+':'+sm:'';
  const endTime=eh&&em?eh+':'+em:'';
  if(!title){alert('제목을 입력해주세요.');return;}
  if(!date){alert('날짜를 선택해주세요.');return;}
  const obj={userId:uid2,title:title,date:date,startTime:startTime,endTime:endTime,memo:memo};
  if(id&&id!=='null'){const i=S.events.findIndex(x=>x.id===id);if(i>=0)S.events[i]=Object.assign({},obj,{id:id});}
  else{S.events.push(Object.assign({},obj,{id:genId()}));}
  S.modal=null;save();
}

function delEvent(id){if(!confirm('이 일정을 삭제할까요?'))return;S.events=S.events.filter(ev=>ev.id!==id);S.modal=null;save();}
function closeModal(){S.modal=null;render();}

function openDayAll(ds){
  const evts=dayEvts(new Date(ds));let items='';
  evts.forEach(ev=>{
    const u=getUser(ev.userId),timeStr=ev.startTime?(ev.startTime+(ev.endTime?' ~ '+ev.endTime:'')):'';
    items+='<div onclick="closeDayAll();openEdit(\''+ev.id+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid #f1f5f9;margin-bottom:8px;background:#fff" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'#fff\'">'+
      '<div style="width:10px;height:10px;border-radius:50%;background:'+(u?u.color:'#999')+';flex-shrink:0"></div>'+
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#1a202c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+ev.title+'</div>'+
      '<div style="font-size:11px;color:#94a3b8;margin-top:2px">'+(u?u.name:'')+(timeStr?' · '+timeStr:'')+'</div></div><span style="color:#cbd5e1">›</span></div>';
  });
  const wrap=document.createElement('div');wrap.id='day-all-root';
  wrap.innerHTML='<div class="overlay" onmousedown="dayAllMD(event)" onmouseup="dayAllMU(event)"><div class="modal" onclick="event.stopPropagation()" style="max-width:360px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
    '<div style="font-size:16px;font-weight:700">'+ds.replace(/-/g,'.')+'</div>'+
    '<button class="btn" onclick="closeDayAll()" style="padding:3px 10px">✕</button></div>'+
    items+'<div class="mact" style="margin-top:8px"><button class="btn prim" onclick="closeDayAll();openNewDate(\''+ds+'\')">+ 일정 추가</button></div></div></div>';
  document.body.appendChild(wrap);
}

let _mdDay=false;
function dayAllMD(ev){_mdDay=ev.target===ev.currentTarget;}
function dayAllMU(ev){if(_mdDay&&ev.target===ev.currentTarget)closeDayAll();_mdDay=false;}
function closeDayAll(){const el=document.getElementById('day-all-root');if(el)el.remove();}

function addUser(){
  const inp=document.getElementById('new-name'),n=(inp&&inp.value||'').trim();
  if(!n)return;
  if(S.users.find(u=>u.name===n)){alert('이미 존재하는 이름입니다.');return;}
  const id=genId(),color=COLORS[S.users.length%COLORS.length];
  S.users.push({id:id,name:n,color:color});
  if(!S.curUser)S.curUser=id;
  inp.value='';save();
}

function delUser(id){
  const u=getUser(id);if(!u)return;
  if(!confirm('\''+u.name+'\' 팀원을 삭제하면 해당 팀원의 모든 일정도 삭제됩니다. 계속할까요?'))return;
  S.users=S.users.filter(x=>x.id!==id);S.events=S.events.filter(x=>x.userId!==id);
  if(S.curUser===id)S.curUser=S.users.length?S.users[0].id:null;
  if(S.filters){S.filters=S.filters.filter(x=>x!==id);if(!S.filters.length)S.filters=null;}
  save();
}

function toggleFilter(id){
  if(!S.filters){S.filters=[id];}
  else if(S.filters.includes(id)){S.filters=S.filters.filter(x=>x!==id);if(!S.filters.length)S.filters=null;}
  else{S.filters.push(id);}
  render();
}

function setView(v){S.view=v;render();}
function prev(){if(S.view==='month'){S.date=new Date(S.date.getFullYear(),S.date.getMonth()-1,1);}else{const d=new Date(S.date);d.setDate(d.getDate()-7);S.date=d;}render();}
function next(){if(S.view==='month'){S.date=new Date(S.date.getFullYear(),S.date.getMonth()+1,1);}else{const d=new Date(S.date);d.setDate(d.getDate()+7);S.date=d;}render();}
function goToday(){
  S.date=new Date();render();
  const d=new Date(),dns=['일','월','화','수','목','금','토'];
  showToast('📅 오늘은 '+d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+dns[d.getDay()]+')');
}
function showToast(msg){
  const old=document.getElementById('toast');if(old)old.remove();
  const t=document.createElement('div');t.id='toast';t.textContent=msg;
  t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a202c;color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)';
  document.body.appendChild(t);
  setTimeout(()=>t.style.opacity='1',10);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},2800);
}
function openNew(){if(!S.users.length)return;if(!S.curUser)S.curUser=S.users[0].id;S.modal={userId:S.curUser,date:fmt(S.date)};render();}
function openNewDate(ds){if(!S.users.length)return;if(!S.curUser)S.curUser=S.users[0].id;S.modal={userId:S.curUser,date:ds};render();}
function openNewDT(ds,t){if(!S.users.length)return;if(!S.curUser)S.curUser=S.users[0].id;S.modal={userId:S.curUser,date:ds,startTime:t};render();}
function openEdit(id){const ev=S.events.find(x=>x.id===id);if(!ev)return;S.modal=Object.assign({},ev,{_mode:'view'});render();}

// 스와이프
let _tx=0,_ty=0;
document.addEventListener('touchstart',function(e){_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',function(e){
  const dx=e.changedTouches[0].clientX-_tx,dy=e.changedTouches[0].clientY-_ty;
  const cal=document.getElementById('cal-body');
  if(cal&&cal.contains(e.target)&&Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){dx<0?next():prev();}
},{passive:true});

// 오늘 날짜 표시
const _td=new Date(),_dns=['일','월','화','수','목','금','토'];
document.getElementById('today-label').textContent='오늘 '+_td.getFullYear()+'년 '+(_td.getMonth()+1)+'월 '+_td.getDate()+'일 ('+_dns[_td.getDay()]+')';
document.getElementById('new-name').addEventListener('keydown',function(e){if(e.key==='Enter')addUser();});
</script>
</body>
</html>
